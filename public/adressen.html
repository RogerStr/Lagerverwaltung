<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adressen – Lagerverwaltung</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="nav" class="topnav"></nav>

<main>
  <div class="pagehead"><h1>👤 Adressen</h1></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px" id="spalten">
    <section>
      <div class="pagehead">
        <h2 style="margin:0;font-size:18px">📥 Empfänger (Kunden)</h2>
        <button class="green small" onclick="openAdr('kunde')">+ Hinzufügen</button>
      </div>
      <div class="card"><table><tbody id="kundenBody"></tbody></table>
        <div class="empty" id="kundenEmpty" style="display:none">Noch keine Empfänger erfasst.</div>
      </div>
    </section>

    <section>
      <div class="pagehead">
        <h2 style="margin:0;font-size:18px">🏢 Verkäufer (eigene Adressen)</h2>
        <button class="green small" onclick="openAdr('verkaeufer')">+ Hinzufügen</button>
      </div>
      <div class="card"><table><tbody id="verkBody"></tbody></table>
        <div class="empty" id="verkEmpty" style="display:none">Noch keine Verkäufer-Adresse. Die mit ★ markierte wird auf der Rechnung als Absender genutzt.</div>
      </div>
    </section>
  </div>
</main>

<!-- Adress-Modal -->
<div class="modal-backdrop" id="adrModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="adrTitle">Adresse</h2>
      <button class="close-x" onclick="closeModal('adrModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="a_id">
      <input type="hidden" id="a_typ">
      <div class="form-grid">
        <div class="field full"><label>Name *</label><input type="text" id="a_name" placeholder="Vor- und Nachname / Ansprechpartner"></div>
        <div class="field full"><label>Firma</label><input type="text" id="a_firma" placeholder="optional"></div>
        <div class="field full"><label>Strasse / Nr.</label><input type="text" id="a_strasse"></div>
        <div class="field"><label>PLZ</label><input type="text" id="a_plz"></div>
        <div class="field"><label>Ort</label><input type="text" id="a_ort"></div>
        <div class="field"><label>Land</label><input type="text" id="a_land" placeholder="z.B. Schweiz"></div>
        <div class="field"><label>Telefon</label><input type="text" id="a_telefon"></div>
        <div class="field full"><label>E-Mail</label><input type="email" id="a_email"></div>
        <div class="field full"><label>Notiz</label><textarea id="a_notiz" rows="2"></textarea></div>
        <div class="field full" id="a_logoWrap" style="display:none">
          <label>Logo <span class="muted" style="font-weight:400">(erscheint links oben auf der Rechnung)</span></label>
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
            <div id="a_logoBox" style="width:120px;height:70px;border:1px dashed var(--border,#ccc);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff">
              <span class="muted" id="a_logoLeer" style="font-size:12px">kein Logo</span>
              <img id="a_logoImg" alt="Logo" style="max-width:100%;max-height:100%;display:none">
            </div>
            <div style="display:flex;gap:8px">
              <input type="file" id="a_logo_input" accept="image/*" style="display:none">
              <button type="button" class="secondary small" onclick="document.getElementById('a_logo_input').click()">Logo wählen</button>
              <button type="button" class="gray small" id="a_logo_del" style="display:none" onclick="logoEntfernen()">Entfernen</button>
            </div>
          </div>
        </div>
        <div class="field full" id="a_stdWrap" style="display:none">
          <label style="display:flex;align-items:center;gap:8px;font-weight:500">
            <input type="checkbox" id="a_std" style="width:auto"> Als Standard-Absender auf Rechnungen verwenden
          </label>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="gray" onclick="closeModal('adrModal')">Abbrechen</button>
      <button class="green" onclick="saveAdr()">Speichern</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
<script>
renderNav('adressen');
let alle = [];
let logoNeu = null;       // Data-URL eines neu gewählten Logos (noch nicht gespeichert)
let logoEntf = false;     // vorhandenes Logo beim Speichern entfernen?

async function laden() {
  try {
    alle = await api('/adressen');
    setStatus(true);
    render();
  } catch (e) { setStatus(false); toast('⚠ Server nicht erreichbar', true); }
}

function adrZeile(a, zeigeStern) {
  const kontakt = [a.telefon, a.email].filter(Boolean).join(' · ');
  const stern = (zeigeStern && a.ist_standard) ? ' <span title="Standard-Absender" style="color:var(--amber)">★</span>' : '';
  return `<tr>
    <td>
      <strong>${esc(a.firma || a.name)}</strong>${stern}
      ${a.firma ? `<br><span class="muted" style="font-size:13px">${esc(a.name)}</span>` : ''}
      <br><span class="muted" style="font-size:13px">${esc([a.strasse, [a.plz, a.ort].filter(Boolean).join(' '), a.land].filter(Boolean).join(', ')) || '–'}</span>
      ${kontakt ? `<br><span class="muted" style="font-size:13px">${esc(kontakt)}</span>` : ''}
    </td>
    <td style="width:1%;white-space:nowrap;text-align:right">
      <button class="secondary small" onclick="openAdr('${a.typ}',${a.id})">✎</button>
      <button class="gray small" onclick="delAdr(${a.id})">🗑</button>
    </td>
  </tr>`;
}

function render() {
  const kunden = alle.filter(a => a.typ === 'kunde');
  const verk = alle.filter(a => a.typ === 'verkaeufer');
  const mehrVerk = verk.length > 1; // Standard-Markierung erst ab 2 Adressen sinnvoll
  document.getElementById('kundenBody').innerHTML = kunden.map(a => adrZeile(a, false)).join('');
  document.getElementById('verkBody').innerHTML = verk.map(a => adrZeile(a, mehrVerk)).join('');
  document.getElementById('kundenEmpty').style.display = kunden.length ? 'none' : 'block';
  document.getElementById('verkEmpty').style.display = verk.length ? 'none' : 'block';
}

function openAdr(typ, id) {
  document.getElementById('a_typ').value = typ;
  document.getElementById('a_id').value = id || '';
  document.getElementById('adrTitle').textContent = (id ? 'Adresse bearbeiten' : 'Neue Adresse') + (typ === 'kunde' ? ' – Empfänger' : ' – Verkäufer');
  const fields = ['name', 'firma', 'strasse', 'plz', 'ort', 'land', 'telefon', 'email', 'notiz'];
  const a = id ? alle.find(x => x.id === id) : null;
  fields.forEach(k => document.getElementById('a_' + k).value = a ? (a[k] ?? '') : '');
  // Standard-Option nur zeigen, wenn es (mind.) eine weitere Verkäufer-Adresse gibt
  const andereVerk = alle.filter(x => x.typ === 'verkaeufer' && x.id !== id).length;
  document.getElementById('a_stdWrap').style.display = (typ === 'verkaeufer' && andereVerk >= 1) ? 'block' : 'none';
  document.getElementById('a_std').checked = a ? !!a.ist_standard : false;

  // Logo nur bei Verkäufer-Adressen
  logoNeu = null; logoEntf = false;
  document.getElementById('a_logo_input').value = '';
  document.getElementById('a_logoWrap').style.display = (typ === 'verkaeufer') ? 'block' : 'none';
  const hatLogo = a && a.hat_logo;
  zeigeLogo(hatLogo ? `/api/adressen/${id}/logo?ts=${Date.now()}` : null);

  openModal('adrModal');
  setTimeout(() => document.getElementById('a_name').focus(), 50);
}

// Logo-Vorschau setzen (url = null → „kein Logo")
function zeigeLogo(url) {
  const img = document.getElementById('a_logoImg');
  const leer = document.getElementById('a_logoLeer');
  const del = document.getElementById('a_logo_del');
  if (url) {
    img.src = url; img.style.display = 'block'; leer.style.display = 'none'; del.style.display = 'inline-block';
  } else {
    img.removeAttribute('src'); img.style.display = 'none'; leer.style.display = 'block'; del.style.display = 'none';
  }
}

function logoEntfernen() {
  logoNeu = null; logoEntf = true;
  document.getElementById('a_logo_input').value = '';
  zeigeLogo(null);
}

// Logo lesen und auf max. 500 px verkleinern (PNG, behält Transparenz)
function leseLogo(file, maxDim = 500) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) { reject(new Error('Bitte eine Bilddatei wählen')); return; }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Bild konnte nicht geladen werden'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = Math.min(maxDim / width, maxDim / height);
          width = Math.round(width * scale); height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('a_logo_input').addEventListener('change', async function () {
  const file = this.files[0];
  this.value = '';
  if (!file) return;
  try {
    logoNeu = await leseLogo(file);
    logoEntf = false;
    zeigeLogo(logoNeu);
  } catch (e) { toast('⚠ ' + e.message, true); }
});

async function saveAdr() {
  const name = document.getElementById('a_name').value.trim();
  if (!name) { toast('⚠ Name ist erforderlich', true); return; }
  const id = document.getElementById('a_id').value;
  const body = {
    typ: document.getElementById('a_typ').value,
    name,
    firma: document.getElementById('a_firma').value,
    strasse: document.getElementById('a_strasse').value,
    plz: document.getElementById('a_plz').value,
    ort: document.getElementById('a_ort').value,
    land: document.getElementById('a_land').value,
    telefon: document.getElementById('a_telefon').value,
    email: document.getElementById('a_email').value,
    notiz: document.getElementById('a_notiz').value,
    ist_standard: document.getElementById('a_std').checked ? 1 : 0,
  };
  if (logoNeu) body.logo = logoNeu;
  else if (logoEntf) body.logo_entfernen = true;
  try {
    if (id) await api('/adressen/' + id, { method: 'PUT', body: JSON.stringify(body) });
    else await api('/adressen', { method: 'POST', body: JSON.stringify(body) });
    closeModal('adrModal');
    await laden();
    toast('✔ Adresse gespeichert');
  } catch (e) { toast('⚠ ' + e.message, true); }
}

async function delAdr(id) {
  const a = alle.find(x => x.id === id);
  if (!confirm(`Adresse „${a.firma || a.name}" wirklich löschen?`)) return;
  try { await api('/adressen/' + id, { method: 'DELETE' }); await laden(); toast('🗑 Adresse gelöscht'); }
  catch (e) { toast('⚠ ' + e.message, true); }
}

laden();
</script>
</body>
</html>
